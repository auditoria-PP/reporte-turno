<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Reporte de Turno</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f4f4f4;color:#222;font-size:14px}
.header{background:#185FA5;color:#fff;padding:14px 20px;font-size:16px;font-weight:bold}
.container{max-width:740px;margin:0 auto;padding:16px}
.tabs{display:flex;flex-wrap:wrap;background:#fff;border-bottom:2px solid #185FA5;margin-bottom:16px;border-radius:6px 6px 0 0;overflow:hidden}
.tab{padding:10px 16px;font-size:13px;font-weight:bold;color:#888;cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;margin-bottom:-2px}
.tab.active{color:#185FA5;border-bottom-color:#185FA5;background:#f0f6ff}
.panel{display:none;background:#fff;border-radius:0 0 8px 8px;padding:18px;margin-bottom:12px;border:1px solid #ddd}
.panel.active{display:block}
.sec{font-size:10px;font-weight:bold;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;margin-top:16px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.row1{margin-bottom:12px}
.field{display:flex;flex-direction:column;gap:4px}
label{font-size:12px;color:#666;font-weight:bold}
label .req{color:#c0392b}
input,select{width:100%;font-size:14px;padding:7px 10px;border:1px solid #ccc;border-radius:6px;background:#fff;color:#222}
input:focus,select:focus{border-color:#185FA5;outline:none;box-shadow:0 0 0 2px rgba(24,95,165,.15)}
input.err{border-color:#c0392b;background:#fdf0ef}
input.good{border-color:#1D9E75;background:#edfaf4}
input[readonly]{background:#f5f5f5;color:#888}
.hint{font-size:11px;color:#aaa;margin-top:2px}
.hint.err{color:#a93226}.hint.ok{color:#0F6E56}
.card{border:1px solid #ddd;border-radius:8px;padding:14px;margin-bottom:12px;background:#fff}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.card-title{font-size:13px;font-weight:bold;color:#333}
.badge{font-size:11px;padding:2px 8px;border-radius:100px;font-weight:bold;background:#dbeafe;color:#1e40af}
.drow{display:grid;gap:8px;align-items:end;margin-bottom:8px}
.drow.r4{grid-template-columns:90px 100px 1fr 110px 24px}
.drow.o3{grid-template-columns:160px 110px 1fr 24px}
.drow.n2{grid-template-columns:1fr 110px 24px}
.col-heads{display:grid;gap:8px;margin-bottom:4px}
.col-heads.r4{grid-template-columns:90px 100px 1fr 110px 24px}
.col-heads.o3{grid-template-columns:160px 110px 1fr 24px}
.col-heads.n2{grid-template-columns:1fr 110px 24px}
.col-head{font-size:10px;font-weight:bold;color:#aaa;text-transform:uppercase;letter-spacing:.05em}
.rlabel{font-size:12px;color:#666;font-weight:bold}
.btn-add{font-size:12px;color:#185FA5;background:none;border:1px dashed #93c5fd;border-radius:6px;padding:5px 12px;cursor:pointer;margin-top:4px}
.btn-add:hover{background:#eff6ff}
.btn-rem{font-size:14px;color:#bbb;background:none;border:none;cursor:pointer;padding:0 2px;margin-bottom:7px}
.btn-rem:hover{color:#c0392b}
.apart-toggle{display:flex;align-items:center;gap:5px;font-size:12px;color:#666;cursor:pointer;padding:6px 8px;border-radius:6px;border:1px solid #ddd;background:#f9f9f9;white-space:nowrap;margin-bottom:7px}
.apart-toggle.on{background:#fef3c7;color:#92400e;border-color:#f59e0b}
.apart-toggle input[type=checkbox]{width:14px;height:14px;margin:0;accent-color:#d97706}
.resumen-bar{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.res-card{background:#f5f5f5;border-radius:8px;padding:10px 14px}
.res-card.hl{background:#fef3c7;border:1px solid #f59e0b}
.res-label{font-size:11px;color:#888;margin-bottom:4px}
.res-label.w{color:#92400e}
.res-val{font-size:20px;font-weight:bold;color:#222}
.res-val.w{color:#78350f}
.tpv-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.tpv-sub{font-size:10px;font-weight:bold;color:#888;text-transform:uppercase;letter-spacing:.06em;margin:10px 0 6px;grid-column:1/-1;border-bottom:1px solid #eee;padding-bottom:4px}
.total-bar{background:#f0f6ff;border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin:14px 0;border:1px solid #bfdbfe}
.total-bar span:first-child{font-size:13px;color:#555}
.total-bar span:last-child{font-size:20px;font-weight:bold;color:#1e3a5f}
.btn-send{width:100%;padding:12px;font-size:15px;font-weight:bold;background:#185FA5;color:#fff;border:none;border-radius:8px;cursor:pointer;margin-top:4px}
.btn-send:hover{background:#0C447C}
.btn-send:disabled{background:#aaa;cursor:not-allowed}
.alert{border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px;display:none}
.alert.warn{background:#fef3c7;color:#78350f;border:1px solid #f59e0b}
.alert.danger{background:#fdf0ef;color:#641e16;border:1px solid #c0392b}
.alert.success{background:#edfaf4;color:#0d3321;border:1px solid #1D9E75}
.nav-btns{display:flex;gap:10px;margin-top:16px}
.btn-nav{flex:1;padding:9px;font-size:13px;font-weight:bold;border:1px solid #ccc;border-radius:8px;background:#fff;color:#333;cursor:pointer}
.btn-nav:hover{background:#f5f5f5}
.btn-nav.fwd{background:#185FA5;color:#fff;border-color:#185FA5}
.btn-nav.fwd:hover{background:#0C447C}
</style>
</head>
<body>
<div class="header">Reporte de Turno — PIZZAS PLAZAo</div>
<div class="container">
<div class="alert warn" id="al-warn"></div>
<div class="alert danger" id="al-dup"></div>
<div class="alert success" id="al-ok"></div>

<div class="tabs">
  <button class="tab active" onclick="goTab(0)">1 — Encabezado</button>
  <button class="tab" onclick="goTab(1)">2 — Fondos</button>
  <button class="tab" onclick="goTab(2)">3 — Retiros</button>
  <button class="tab" onclick="goTab(3)">4 — Otros gastos</button>
  <button class="tab" onclick="goTab(4)">5 — Nómina</button>
  <button class="tab" onclick="goTab(5)">6 — Tarjetas</button>
</div>

<div id="panel-0" class="panel active">
  <div class="sec">Identificación del turno</div>
  <div class="row3">
    <div class="field"><label>Sucursal <span class="req">*</span></label>
      <select id="suc">
        <option value="">— selecciona —</option>
        <option>MIR</option><option>STA</option><option>COY</option><option>DIV</option>
        <option>CAF</option><option>UNIV</option><option>RENATO</option><option>XOC</option>
        <option>NAPOLES</option><option>ANZURES</option><option>LERMA</option>
      </select></div>
    <div class="field"><label>Fecha <span class="req">*</span></label><input type="date" id="fecha"/></div>
    <div class="field"><label>Turno <span class="req">*</span></label>
      <select id="turno">
        <option value="">— selecciona —</option>
        <option value="1">Turno 1</option><option value="2">Turno 2</option><option value="3">Turno 3</option>
